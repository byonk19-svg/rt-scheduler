name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Build/typecheck should not depend on deployment secrets.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  security_regressions:
    name: Security Regressions
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run security regression unit tests
        run: >
          npm run test:unit --
          src/lib/security/request-origin.test.ts
          src/lib/security/worker-auth.test.ts
          src/app/auth/signout/route.test.ts
          src/app/api/schedule/assignment-status/route.test.ts
          src/app/api/schedule/drag-drop/route.test.ts

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test:unit

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs:
      - quality
      - unit
      - security_regressions
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check seeded e2e secret availability
        id: seeded
        shell: bash
        run: |
          if [[ -n "${NEXT_PUBLIC_SUPABASE_URL}" && -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" && -n "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "run_seeded=true" >> "$GITHUB_OUTPUT"
            echo "Seeded DB-backed E2E enabled."
            echo "Seeded mode validates more workflows, including DB-backed scheduling coverage."
          else
            echo "run_seeded=false" >> "$GITHUB_OUTPUT"
            echo "Seeded Supabase secrets are not fully set."
            echo "Seeded mode requires NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, and SUPABASE_SERVICE_ROLE_KEY."
            echo "Reduced E2E is useful, but it is not enough for final demo confidence."
          fi

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run seeded DB-backed E2E tests
        if: steps.seeded.outputs.run_seeded == 'true'
        run: |
          echo "Running seeded DB-backed E2E tests."
          echo "Seeded mode validates more workflows because Supabase test data and service-role access are available."
          npm run test:e2e

      - name: Run reduced E2E tests without Supabase secrets
        if: steps.seeded.outputs.run_seeded != 'true'
        run: |
          echo "Running reduced E2E tests without Supabase secrets."
          echo "Reduced mode is useful for public/auth coverage, but it is not enough for final demo confidence."
          echo "Seeded mode requires NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, and SUPABASE_SERVICE_ROLE_KEY."
          export NEXT_PUBLIC_SUPABASE_URL="https://example.supabase.co"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="ci-placeholder-anon-key"
          npx playwright test e2e/auth-redirect.spec.ts e2e/public-pages.spec.ts e2e/authenticated-flow.spec.ts

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
